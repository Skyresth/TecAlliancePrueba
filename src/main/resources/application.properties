spring.application.name=pricing-api

server.shutdown=graceful

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/pricing}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:pricing}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:pricing}
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

spring.flyway.enabled=true

spring.cache.cache-names=articleById,articlePrices,articlePriceList

management.endpoints.web.exposure.include=health,info,metrics,prometheus,caches
management.endpoint.health.probes.enabled=true
management.health.livenessstate.enabled=true
management.health.readinessstate.enabled=true
management.endpoint.health.show-details=always
management.endpoint.health.group.liveness.include=livenessState,ping
management.endpoint.health.group.readiness.include=readinessState,db

springdoc.api-docs.enabled=false
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.url=/openapi/openapi.yaml

app.rate-limit.list-capacity=20
app.rate-limit.list-window=1m
app.rate-limit.price-capacity=60
app.rate-limit.price-window=1m
app.rate-limit.write-capacity=30
app.rate-limit.write-window=1m
