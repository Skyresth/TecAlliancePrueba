spring.datasource.url=jdbc:h2:mem:pricing;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver

# Disable Flyway in tests
spring.flyway.enabled=false
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

springdoc.api-docs.enabled=false

# Rate-limit properties are required by RateLimitProperties; we give permissive
# values so the context starts good in test.
app.rate-limit.list-capacity=1000
app.rate-limit.list-window=1m
app.rate-limit.price-capacity=1000
app.rate-limit.price-window=1m
app.rate-limit.write-capacity=1000
app.rate-limit.write-window=1m
