services:
  postgres:
    image: postgres:16-alpine
    container_name: pricing-postgres
    environment:
      POSTGRES_DB: pricing
      POSTGRES_USER: pricing
      POSTGRES_PASSWORD: pricing
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

  pricing-api:
    build:
      context: .
    container_name: pricing-api
    depends_on:
      - postgres
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/pricing
      SPRING_DATASOURCE_USERNAME: pricing
      SPRING_DATASOURCE_PASSWORD: pricing
      SPRING_PROFILES_ACTIVE: docker
    ports:
      - "8080:8080"

volumes:
  postgres-data:
